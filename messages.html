<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilimly — Сообщения</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --tiffany:#0ABAB5;--tiffany-dark:#089490;--tiffany-light:#e0f7f6;--tiffany-pale:#f0fbfb;
  --gold:#c9a84c;
  --ink:#0a0a0a;--ink-60:rgba(10,10,10,0.6);--ink-30:rgba(10,10,10,0.3);--ink-10:rgba(10,10,10,0.06);
  --white:#ffffff;--border:rgba(10,10,10,0.08);--bg:#f8fafa;
  --shadow:0 2px 12px rgba(0,0,0,0.06);--shadow-lg:0 16px 48px rgba(10,186,181,0.12);
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{overflow-x:hidden;height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;}

/* NAV */
nav{background:rgba(255,255,255,0.95);border-bottom:1px solid var(--border);padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;backdrop-filter:blur(20px);}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--tiffany);text-decoration:none;}
.logo span{color:var(--gold);}
.back-btn{font-size:0.82rem;color:var(--ink-60);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color 0.2s;}
.back-btn:hover{color:var(--tiffany);}
.nav-user{font-size:0.82rem;font-weight:600;color:var(--tiffany);}

/* CHAT WRAP */
.chat-wrap{display:flex;flex:1;overflow:hidden;max-width:1100px;width:100%;margin:0 auto;background:white;box-shadow:var(--shadow);}

/* SIDEBAR */
.conv-sidebar{width:320px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:white;}
.conv-top{padding:16px;border-bottom:1px solid var(--border);}
.conv-top h2{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;margin-bottom:10px;}
.conv-search{position:relative;}
.conv-search input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:9px 14px 9px 36px;font-family:inherit;font-size:0.82rem;outline:none;background:#f8fafa;transition:all 0.2s;}
.conv-search input:focus{border-color:var(--tiffany);background:white;}
.conv-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-30);font-size:0.9rem;}
.conv-list{flex:1;overflow-y:auto;}
.conv-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;position:relative;}
.conv-item:hover{background:var(--tiffany-pale);}
.conv-item.active{background:var(--tiffany-pale);border-left:3px solid var(--tiffany);}
.conv-row{display:flex;align-items:center;gap:12px;}
.conv-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--tiffany),var(--tiffany-dark));color:white;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;overflow:hidden;}
.conv-av img{width:100%;height:100%;object-fit:cover;}
.conv-info{flex:1;min-width:0;}
.conv-name{font-size:0.88rem;font-weight:600;margin-bottom:2px;}
.conv-preview{font-size:0.75rem;color:var(--ink-60);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.conv-time{font-size:0.68rem;color:var(--ink-30);}
.conv-badge{background:var(--tiffany);color:white;border-radius:12px;font-size:0.65rem;font-weight:700;padding:2px 7px;min-width:20px;text-align:center;}
.new-chat-btn{padding:12px 16px;border-top:1px solid var(--border);}
.new-chat-btn button{width:100%;background:var(--tiffany);color:white;border:none;padding:10px;border-radius:10px;font-size:0.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.new-chat-btn button:hover{background:var(--tiffany-dark);}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f8fafa;}

/* EMPTY STATE */
.chat-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#f8fafa;}
.chat-empty-icon{width:72px;height:72px;border-radius:50%;background:var(--tiffany-pale);display:flex;align-items:center;justify-content:center;font-size:2rem;}
.chat-empty h3{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;}
.chat-empty p{font-size:0.85rem;color:var(--ink-60);}

/* CHAT HEADER */
.chat-header{padding:14px 20px;background:white;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.back-to-list{background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--ink-60);display:none;padding:4px;}
.ch-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--tiffany),var(--tiffany-dark));color:white;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;overflow:hidden;}
.ch-av img{width:100%;height:100%;object-fit:cover;}
.ch-info{flex:1;}
.ch-name{font-weight:600;font-size:0.92rem;}
.ch-status{font-size:0.72rem;color:var(--tiffany);}
.ch-actions{display:flex;gap:8px;}
.ch-action{background:none;border:1.5px solid var(--border);color:var(--ink-60);padding:7px 14px;border-radius:8px;font-size:0.75rem;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.ch-action:hover{border-color:var(--tiffany);color:var(--tiffany);}

/* MESSAGES */
.chat-msgs{flex:1;padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
.date-sep{text-align:center;font-size:0.72rem;color:var(--ink-30);margin:4px 0;display:flex;align-items:center;gap:10px;}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border);}
.msg-wrap{display:flex;align-items:flex-end;gap:8px;}
.msg-wrap.mine{flex-direction:row-reverse;}
.msg-av-sm{width:28px;height:28px;border-radius:50%;background:var(--tiffany-pale);display:flex;align-items:center;justify-content:center;font-size:0.75rem;flex-shrink:0;color:var(--tiffany);font-weight:600;}
.msg{max-width:68%;padding:10px 14px;border-radius:16px;font-size:0.85rem;line-height:1.55;position:relative;}
.msg.theirs{background:white;border:1px solid var(--border);border-radius:16px 16px 16px 4px;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
.msg.mine{background:var(--tiffany);color:white;border-radius:16px 16px 4px 16px;}
.msg-time{font-size:0.62rem;opacity:0.5;margin-top:4px;display:block;}
.msg-file{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;margin-top:6px;cursor:pointer;text-decoration:none;transition:background 0.15s;}
.msg-file.mine-file{background:rgba(255,255,255,0.15);color:white;}
.msg-file.their-file{background:var(--tiffany-pale);color:var(--tiffany-dark);}
.msg-file span{font-size:0.78rem;font-weight:600;}

/* INPUT */
.chat-input-area{padding:12px 16px;background:white;border-top:1px solid var(--border);flex-shrink:0;}
.chat-input-row{display:flex;gap:8px;align-items:flex-end;}
.input-wrap{flex:1;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:border-color 0.2s;}
.input-wrap:focus-within{border-color:var(--tiffany);}
.msg-textarea{border:none;outline:none;padding:10px 14px;font-family:inherit;font-size:0.85rem;resize:none;max-height:100px;min-height:40px;background:white;}
.input-toolbar{display:flex;gap:4px;padding:6px 10px;border-top:1px solid var(--border);background:#f8fafa;}
.toolbar-btn{background:none;border:none;cursor:pointer;font-size:0.9rem;padding:4px 7px;border-radius:6px;color:var(--ink-60);transition:all 0.15s;}
.toolbar-btn:hover{background:var(--tiffany-pale);color:var(--tiffany);}
.send-btn{background:var(--tiffany);color:white;border:none;width:44px;height:44px;border-radius:12px;cursor:pointer;font-size:1.1rem;flex-shrink:0;align-self:flex-end;transition:all 0.2s;}
.send-btn:hover{background:var(--tiffany-dark);}

/* NEW CHAT MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.modal{background:white;border-radius:20px;max-width:420px;width:100%;padding:24px;box-shadow:0 32px 80px rgba(0,0,0,0.2);animation:popIn 0.3s ease;}
@keyframes popIn{from{transform:scale(0.92) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.modal h3{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;margin-bottom:16px;}
.modal-search{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-family:inherit;font-size:0.875rem;outline:none;margin-bottom:12px;transition:border-color 0.2s;}
.modal-search:focus{border-color:var(--tiffany);}
.search-result{padding:10px 12px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background 0.15s;}
.search-result:hover{background:var(--tiffany-pale);}
.sr-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--tiffany),var(--tiffany-dark));color:white;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;}
.sr-name{font-weight:600;font-size:0.85rem;}
.sr-sub{font-size:0.72rem;color:var(--ink-60);}
.btn-cancel{width:100%;margin-top:12px;background:none;border:1.5px solid var(--border);padding:10px;border-radius:10px;cursor:pointer;font-family:inherit;font-size:0.85rem;transition:all 0.2s;}
.btn-cancel:hover{border-color:var(--tiffany);color:var(--tiffany);}

#toast{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--tiffany);color:white;padding:11px 22px;border-radius:10px;font-weight:600;z-index:9999;font-size:0.875rem;box-shadow:var(--shadow-lg);}

@media(max-width:640px){
  .conv-sidebar{width:100%;}
  .conv-sidebar.hidden{display:none;}
  .chat-area.hidden{display:none;}
  .back-to-list{display:block!important;}
  .ch-actions{display:none;}
}
</style>
</head>
<body>

<nav>
  <a class="back-btn" href="index.html">← На сайт</a>
  <a class="logo" href="index.html">Bilimly<span>.kg</span></a>
  <span class="nav-user" id="nav-user"></span>
</nav>

<div class="chat-wrap">
  <!-- SIDEBAR -->
  <div class="conv-sidebar" id="conv-sidebar">
    <div class="conv-top">
      <h2>Сообщения</h2>
      <div class="conv-search">
        <span class="conv-search-icon">🔍</span>
        <input type="text" placeholder="Поиск диалогов..." id="conv-search" oninput="searchConvs(this.value)">
      </div>
    </div>
    <div class="conv-list" id="conv-list">
      <div style="text-align:center;padding:30px;color:var(--ink-60);font-size:0.85rem">Загрузка...</div>
    </div>
    <div class="new-chat-btn">
      <button onclick="openNewChat()">+ Новый диалог</button>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chat-area">
    <div class="chat-empty" id="chat-empty">
      <div class="chat-empty-icon">💬</div>
      <h3>Выберите диалог</h3>
      <p>или начните новый разговор</p>
    </div>

    <div id="active-chat" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="chat-header">
        <button class="back-to-list" onclick="backToList()">←</button>
        <div class="ch-av" id="ch-av">👤</div>
        <div class="ch-info">
          <div class="ch-name" id="ch-name">—</div>
          <div class="ch-status">● Онлайн</div>
        </div>
        <div class="ch-actions">
          <button class="ch-action" onclick="window.location.href='index.html'">📅 Записаться</button>
        </div>
      </div>
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-input-area">
        <div class="chat-input-row">
          <div class="input-wrap">
            <textarea class="msg-textarea" id="msg-input" placeholder="Написать сообщение..." rows="1"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
              oninput="autoResize(this)"></textarea>
            <div class="input-toolbar">
              <button class="toolbar-btn" onclick="document.getElementById('file-input').click()" title="Прикрепить файл">📎</button>
              <button class="toolbar-btn" title="Emoji" onclick="insertEmoji()">😊</button>
              <input type="file" id="file-input" style="display:none" accept=".pdf,.doc,.docx,.jpg,.png" onchange="sendFile(this)">
            </div>
          </div>
          <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- NEW CHAT MODAL -->
<div class="overlay" id="newChatModal">
  <div class="modal">
    <h3>Новый диалог</h3>
    <input class="modal-search" type="text" id="tutor-search" placeholder="Найти репетитора..." oninput="searchTutors(this.value)">
    <div id="tutor-results" style="max-height:220px;overflow-y:auto;"></div>
    <button class="btn-cancel" onclick="document.getElementById('newChatModal').classList.remove('open')">Отмена</button>
  </div>
</div>

<div id="toast"></div>

<script>
const API='https://bilimly-backend-0zbt.onrender.com';
let token=localStorage.getItem('bilimly_token');
let currentUser=JSON.parse(localStorage.getItem('bilimly_user')||'null');
let selectedConvId=null;
let conversations=[];
let pollTimer=null;

if(!token||!currentUser){window.location.href='index.html';}

document.getElementById('nav-user').textContent=currentUser?.first_name+' '+currentUser?.last_name;

async function apiFetch(path,options={}){
  const res=await fetch(API+path,{...options,headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json',...(options.headers||{})}});
  if(res.status===401){window.location.href='index.html';return null;}
  return res.json();
}

// ── CONVERSATIONS ──────────────────────────────────────────
async function loadConversations(){
  const data=await apiFetch('/api/messages/conversations');
  if(!data)return;
  conversations=data;
  renderConversations(data);
}

function renderConversations(list){
  const el=document.getElementById('conv-list');
  if(!list.length){
    el.innerHTML='<div style="text-align:center;padding:30px;color:var(--ink-60);font-size:0.82rem">Нет диалогов.<br>Нажмите "+ Новый диалог"</div>';
    return;
  }
  el.innerHTML=list.map(c=>{
    const isStudent=currentUser.id===c.student_id;
    const otherName=isStudent?`${c.tutor_first_name} ${c.tutor_last_name}`:`${c.student_first_name} ${c.student_last_name}`;
    const otherAv=isStudent?c.tutor_avatar:c.student_avatar;
    const unread=isStudent?c.student_unread:c.tutor_unread;
    const time=c.last_message_at?formatTime(new Date(c.last_message_at)):'';
    return `
      <div class="conv-item ${c.id===selectedConvId?'active':''}" onclick="openConv('${c.id}','${otherName}','${otherAv||''}')">
        <div class="conv-row">
          <div class="conv-av">${otherAv?`<img src="${otherAv}" alt="${otherName}">`:'👤'}</div>
          <div class="conv-info">
            <div class="conv-name">${otherName}</div>
            <div class="conv-preview">${c.last_message||'Начните диалог'}</div>
          </div>
          <div class="conv-meta">
            <span class="conv-time">${time}</span>
            ${unread>0?`<span class="conv-badge">${unread}</span>`:''}
          </div>
        </div>
      </div>`;
  }).join('');
}

function searchConvs(q){
  if(!q){renderConversations(conversations);return;}
  const f=conversations.filter(c=>{
    const isStudent=currentUser.id===c.student_id;
    const name=isStudent?`${c.tutor_first_name} ${c.tutor_last_name}`:`${c.student_first_name} ${c.student_last_name}`;
    return name.toLowerCase().includes(q.toLowerCase());
  });
  renderConversations(f);
}

function formatTime(date){
  const now=new Date();
  const diff=now-date;
  if(diff<60000)return'Только что';
  if(diff<3600000)return Math.floor(diff/60000)+' мин';
  if(diff<86400000)return date.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  return date.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
}

// ── OPEN CONVERSATION ──────────────────────────────────────
async function openConv(convId,name,avatar){
  selectedConvId=convId;
  document.getElementById('chat-empty').style.display='none';
  const ac=document.getElementById('active-chat');
  ac.style.display='flex';ac.style.flexDirection='column';
  document.getElementById('ch-name').textContent=name;
  document.getElementById('ch-av').innerHTML=avatar?`<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`:'👤';

  // Mobile
  if(window.innerWidth<=640){
    document.getElementById('conv-sidebar').classList.add('hidden');
    document.getElementById('chat-area').classList.remove('hidden');
  }

  await loadMessages(convId);
  renderConversations(conversations);

  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(()=>loadMessages(convId,true),4000);
}

async function loadMessages(convId,silent=false){
  const data=await apiFetch('/api/messages/conversations/'+convId+'/messages');
  if(!data)return;
  const area=document.getElementById('chat-msgs');
  const wasBottom=area.scrollHeight-area.clientHeight<=area.scrollTop+60;

  area.innerHTML=data.map((m,i)=>{
    const isMine=m.sender_id===currentUser.id;
    const showDate=i===0||new Date(m.created_at).toDateString()!==new Date(data[i-1]?.created_at).toDateString();
    const time=new Date(m.created_at).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
    const initials=isMine?(currentUser.first_name?.[0]||'?'):(document.getElementById('ch-name').textContent?.[0]||'?');
    return `
      ${showDate?`<div class="date-sep">${new Date(m.created_at).toLocaleDateString('ru-RU',{day:'numeric',month:'long'})}</div>`:''}
      <div class="msg-wrap ${isMine?'mine':''}">
        ${!isMine?`<div class="msg-av-sm">${initials}</div>`:''}
        <div class="msg ${isMine?'mine':'theirs'}">
          ${m.content||''}
          ${m.file_url?`<a href="${m.file_url}" target="_blank" class="msg-file ${isMine?'mine-file':'their-file'}"><span>📎</span><span>${m.file_name||'Файл'}</span></a>`:''}
          <span class="msg-time">${time}</span>
        </div>
      </div>`;
  }).join('');

  if(!silent||wasBottom)area.scrollTop=area.scrollHeight;
  if(!silent)loadConversations();
}

async function sendMsg(){
  if(!selectedConvId)return;
  const input=document.getElementById('msg-input');
  const text=input.value.trim();
  if(!text)return;
  input.value='';input.style.height='auto';

  // Optimistic
  const area=document.getElementById('chat-msgs');
  const div=document.createElement('div');
  div.className='msg-wrap mine';
  div.innerHTML=`<div class="msg mine">${text}<span class="msg-time">Сейчас</span></div>`;
  area.appendChild(div);area.scrollTop=area.scrollHeight;

  await apiFetch('/api/messages/conversations/'+selectedConvId+'/messages',{method:'POST',body:JSON.stringify({content:text})});
  loadMessages(selectedConvId,true);
}

async function sendFile(input){
  const file=input.files[0];if(!file)return;
  showToast('📎 Отправка...');
  await apiFetch('/api/messages/conversations/'+selectedConvId+'/messages',{method:'POST',body:JSON.stringify({content:'📎 Файл: '+file.name,message_type:'file'})});
  loadMessages(selectedConvId);showToast('✓ Отправлено');
}

// ── NEW CHAT ───────────────────────────────────────────────
function openNewChat(){
  document.getElementById('newChatModal').classList.add('open');
  document.getElementById('tutor-results').innerHTML='';
  document.getElementById('tutor-search').value='';
  setTimeout(()=>document.getElementById('tutor-search').focus(),100);
}

async function searchTutors(q){
  if(!q||q.length<2){document.getElementById('tutor-results').innerHTML='';return;}
  const data=await apiFetch('/api/tutors?search='+encodeURIComponent(q));
  if(!data?.tutors)return;
  document.getElementById('tutor-results').innerHTML=data.tutors.slice(0,6).map(t=>`
    <div class="search-result" onclick="startChat('${t.id}')">
      <div class="sr-av">👤</div>
      <div><div class="sr-name">${t.first_name} ${t.last_name}</div><div class="sr-sub">${(t.subjects||[]).join(', ')||'Репетитор'}</div></div>
    </div>`).join('');
}

async function startChat(tutorUserId){
  document.getElementById('newChatModal').classList.remove('open');
  const data=await apiFetch('/api/messages/conversations',{method:'POST',body:JSON.stringify({other_user_id:tutorUserId})});
  if(data){
    await loadConversations();
    const conv=conversations.find(c=>c.id===data.id);
    if(conv){
      const isStudent=currentUser.id===conv.student_id;
      const name=isStudent?`${conv.tutor_first_name} ${conv.tutor_last_name}`:`${conv.student_first_name} ${conv.student_last_name}`;
      openConv(data.id,name,'');
    }
  }
}

function backToList(){
  document.getElementById('conv-sidebar').classList.remove('hidden');
  document.getElementById('chat-area').classList.add('hidden');
  if(pollTimer)clearInterval(pollTimer);
  selectedConvId=null;
}

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function insertEmoji(){const i=document.getElementById('msg-input');i.value+='😊';i.focus();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',3000);}

document.getElementById('newChatModal').addEventListener('click',e=>{if(e.target===document.getElementById('newChatModal'))document.getElementById('newChatModal').classList.remove('open');});

loadConversations();
</script>
