<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilimly — Сообщения</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--primary:#1a5c3a;--primary-light:#e8f5ee;--gold:#d4a017;--coral:#e8533a;--ink:#111827;--muted:#6b7280;--border:#e5e7eb;--bg:#f3f4f6;--white:#fff;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{overflow-x:hidden;height:100%;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;}
nav{background:white;border-bottom:1px solid var(--border);padding:0 5%;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Unbounded',sans-serif;font-size:1.1rem;font-weight:700;color:var(--primary);text-decoration:none;}
.logo span{color:var(--gold);}
.back-btn{font-size:0.82rem;color:var(--muted);text-decoration:none;}
.back-btn:hover{color:var(--primary);}
.chat-wrap{display:flex;flex:1;overflow:hidden;max-width:1000px;margin:0 auto;width:100%;background:white;box-shadow:0 2px 12px rgba(0,0,0,0.06);}

/* CONVERSATIONS LIST */
.conv-sidebar{width:300px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.conv-header{padding:16px;border-bottom:1px solid var(--border);font-family:'Unbounded',sans-serif;font-size:0.88rem;font-weight:700;}
.conv-search{padding:10px 16px;border-bottom:1px solid var(--border);}
.conv-search input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:0.82rem;outline:none;}
.conv-search input:focus{border-color:var(--primary);}
.conv-list{flex:1;overflow-y:auto;}
.conv-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;}
.conv-item:hover,.conv-item.active{background:var(--primary-light);}
.conv-row{display:flex;align-items:center;gap:10px;}
.conv-av{width:42px;height:42px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;overflow:hidden;}
.conv-av img{width:100%;height:100%;object-fit:cover;}
.conv-info{flex:1;min-width:0;}
.conv-name{font-size:0.85rem;font-weight:600;margin-bottom:2px;}
.conv-preview{font-size:0.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.conv-time{font-size:0.68rem;color:var(--muted);}
.conv-badge{background:var(--primary);color:white;border-radius:10px;font-size:0.65rem;font-weight:700;padding:2px 7px;}
.new-chat-btn{padding:12px 16px;border-top:1px solid var(--border);}
.new-chat-btn button{width:100%;background:var(--primary);color:white;border:none;padding:10px;border-radius:8px;font-size:0.82rem;font-weight:600;cursor:pointer;font-family:inherit;}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-header{padding:14px 20px;background:white;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.chat-header-av{width:38px;height:38px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.chat-header-info{flex:1;}
.chat-header-name{font-weight:600;font-size:0.9rem;}
.chat-header-status{font-size:0.72rem;color:var(--muted);}
.chat-header-actions{display:flex;gap:8px;}
.chat-action-btn{background:none;border:1.5px solid var(--border);color:var(--ink);padding:6px 12px;border-radius:7px;font-size:0.75rem;cursor:pointer;font-family:inherit;}
.chat-action-btn:hover{border-color:var(--primary);color:var(--primary);}
.chat-msgs{flex:1;padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;background:#f9fafb;}
.msg-wrap{display:flex;align-items:flex-end;gap:8px;}
.msg-wrap.mine{flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:0.8rem;flex-shrink:0;}
.msg{max-width:70%;padding:10px 14px;border-radius:14px;font-size:0.85rem;line-height:1.5;position:relative;}
.msg.theirs{background:white;border:1px solid var(--border);border-radius:14px 14px 14px 3px;}
.msg.mine{background:var(--primary);color:white;border-radius:14px 14px 3px 14px;}
.msg-time{font-size:0.65rem;opacity:0.6;margin-top:3px;}
.msg-file{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.15);padding:8px 12px;border-radius:8px;margin-top:6px;cursor:pointer;text-decoration:none;}
.msg-file.theirs{background:var(--primary-light);color:var(--primary);}
.msg-file span{font-size:0.78rem;font-weight:600;}
.date-divider{text-align:center;font-size:0.72rem;color:var(--muted);margin:8px 0;}
.empty-chat{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--muted);background:#f9fafb;}
.empty-chat .icon{font-size:3rem;}
.no-conv{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--muted);}

/* INPUT AREA */
.chat-input-area{padding:12px 16px;background:white;border-top:1px solid var(--border);flex-shrink:0;}
.chat-input-row{display:flex;gap:8px;align-items:flex-end;}
.chat-input-wrap{flex:1;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;}
.chat-input-wrap:focus-within{border-color:var(--primary);}
.chat-textarea{border:none;outline:none;padding:10px 14px;font-family:inherit;font-size:0.85rem;resize:none;max-height:120px;min-height:40px;}
.chat-toolbar{display:flex;gap:4px;padding:6px 10px;border-top:1px solid var(--border);background:#f9fafb;}
.toolbar-btn{background:none;border:none;cursor:pointer;font-size:1rem;padding:3px 6px;border-radius:5px;color:var(--muted);}
.toolbar-btn:hover{background:var(--border);color:var(--ink);}
.send-btn{background:var(--primary);color:white;border:none;width:42px;height:42px;border-radius:10px;cursor:pointer;font-size:1.1rem;flex-shrink:0;align-self:flex-end;}
.send-btn:hover{background:#134428;}
.send-btn:disabled{opacity:0.5;cursor:not-allowed;}

/* NEW CHAT MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.modal{background:white;border-radius:14px;max-width:420px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.modal h3{font-family:'Unbounded',sans-serif;font-size:0.95rem;margin-bottom:16px;}
.search-result{padding:10px 14px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background 0.15s;}
.search-result:hover{background:var(--primary-light);}

/* MOBILE */
@media(max-width:640px){
  .conv-sidebar{width:100%;display:none;}
  .conv-sidebar.show{display:flex;}
  .chat-area{display:none;}
  .chat-area.show{display:flex;}
}

#toast{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--primary);color:white;padding:11px 22px;border-radius:10px;font-weight:600;z-index:9999;font-size:0.875rem;}
</style>
</head>
<body>

<nav>
  <a class="back-btn" href="index.html">← На сайт</a>
  <a class="logo" href="index.html">Bilimly<span>.kg</span></a>
  <span id="nav-username" style="font-size:0.82rem;font-weight:600;color:var(--primary)"></span>
</nav>

<div class="chat-wrap">
  <!-- CONVERSATIONS SIDEBAR -->
  <div class="conv-sidebar show" id="conv-sidebar">
    <div class="conv-header">💬 Сообщения</div>
    <div class="conv-search">
      <input type="text" placeholder="Поиск..." id="conv-search" oninput="searchConversations(this.value)">
    </div>
    <div class="conv-list" id="conv-list">
      <div style="text-align:center;padding:30px;color:var(--muted);font-size:0.85rem">Загрузка...</div>
    </div>
    <div class="new-chat-btn">
      <button onclick="openNewChat()">+ Новый диалог</button>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chat-area">
    <div class="no-conv" id="no-conv">
      <div class="icon">💬</div>
      <div style="font-size:0.9rem;font-weight:600">Выберите диалог</div>
      <div style="font-size:0.82rem">или начните новый</div>
    </div>

    <div id="active-chat" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden;">
      <div class="chat-header">
        <button onclick="backToList()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;display:none;" id="back-btn">←</button>
        <div class="chat-header-av" id="chat-header-av">👤</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chat-header-name">—</div>
          <div class="chat-header-status" id="chat-header-status">Репетитор</div>
        </div>
        <div class="chat-header-actions">
          <button class="chat-action-btn" onclick="bookLesson()">📅 Записаться</button>
        </div>
      </div>

      <div class="chat-msgs" id="chat-msgs"></div>

      <div class="chat-input-area">
        <div class="chat-input-row">
          <div class="chat-input-wrap">
            <textarea class="chat-textarea" id="msg-input" placeholder="Написать сообщение..." rows="1"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
              oninput="autoResize(this)"></textarea>
            <div class="chat-toolbar">
              <button class="toolbar-btn" onclick="document.getElementById('file-input').click()" title="Прикрепить файл">📎</button>
              <button class="toolbar-btn" onclick="insertEmoji('😊')" title="Emoji">😊</button>
              <input type="file" id="file-input" style="display:none" accept=".pdf,.doc,.docx,.jpg,.png" onchange="sendFile(this)">
            </div>
          </div>
          <button class="send-btn" onclick="sendMsg()" id="send-btn">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- NEW CHAT MODAL -->
<div class="overlay" id="newChatModal">
  <div class="modal">
    <h3>Новый диалог</h3>
    <div style="margin-bottom:12px">
      <input type="text" id="tutor-search" placeholder="Поиск репетитора..." 
        style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-family:inherit;font-size:0.875rem;outline:none;"
        oninput="searchTutors(this.value)">
    </div>
    <div id="tutor-results" style="max-height:200px;overflow-y:auto;"></div>
    <button onclick="document.getElementById('newChatModal').classList.remove('open')" 
      style="width:100%;margin-top:14px;background:none;border:1.5px solid var(--border);padding:10px;border-radius:8px;cursor:pointer;font-family:inherit;">
      Отмена
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'https://bilimly-backend-0zbt.onrender.com';
let token = localStorage.getItem('bilimly_token');
let currentUser = JSON.parse(localStorage.getItem('bilimly_user') || 'null');
let selectedConvId = null;
let conversations = [];
let pollInterval = null;

// Auth check
if (!token || !currentUser) {
  window.location.href = 'index.html';
}

document.getElementById('nav-username').textContent = currentUser?.first_name + ' ' + currentUser?.last_name;

async function apiFetch(path, options = {}) {
  const res = await fetch(API + path, {
    ...options,
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', ...(options.headers || {}) }
  });
  if (res.status === 401) { window.location.href = 'index.html'; return null; }
  return res.json();
}

// ── LOAD CONVERSATIONS ─────────────────────────────────────
async function loadConversations() {
  const data = await apiFetch('/api/messages/conversations');
  if (!data) return;
  conversations = data;
  renderConversations(data);
}

function renderConversations(list) {
  const el = document.getElementById('conv-list');
  if (!list.length) {
    el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted);font-size:0.82rem">Нет диалогов.<br>Начните новый!</div>';
    return;
  }
  el.innerHTML = list.map(c => {
    const isStudent = currentUser.id === c.student_id;
    const otherName = isStudent ? `${c.tutor_first_name} ${c.tutor_last_name}` : `${c.student_first_name} ${c.student_last_name}`;
    const otherAv = isStudent ? c.tutor_avatar : c.student_avatar;
    const unread = isStudent ? c.student_unread : c.tutor_unread;
    const time = c.last_message_at ? new Date(c.last_message_at).toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}) : '';
    
    return `
      <div class="conv-item ${c.id===selectedConvId?'active':''}" onclick="openConv('${c.id}','${otherName}','${otherAv||''}','${isStudent?'tutor':'student'}')">
        <div class="conv-row">
          <div class="conv-av">${otherAv ? `<img src="${otherAv}">` : '👤'}</div>
          <div class="conv-info">
            <div class="conv-name">${otherName}</div>
            <div class="conv-preview">${c.last_message || 'Нет сообщений'}</div>
          </div>
          <div class="conv-meta">
            <span class="conv-time">${time}</span>
            ${unread > 0 ? `<span class="conv-badge">${unread}</span>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function searchConversations(q) {
  if (!q) { renderConversations(conversations); return; }
  const filtered = conversations.filter(c => {
    const isStudent = currentUser.id === c.student_id;
    const name = isStudent ? `${c.tutor_first_name} ${c.tutor_last_name}` : `${c.student_first_name} ${c.student_last_name}`;
    return name.toLowerCase().includes(q.toLowerCase());
  });
  renderConversations(filtered);
}

// ── OPEN CONVERSATION ──────────────────────────────────────
async function openConv(convId, name, avatar, role) {
  selectedConvId = convId;
  
  document.getElementById('no-conv').style.display = 'none';
  document.getElementById('active-chat').style.display = 'flex';
  document.getElementById('chat-header-name').textContent = name;
  document.getElementById('chat-header-status').textContent = role === 'tutor' ? 'Репетитор' : 'Студент';
  document.getElementById('chat-header-av').innerHTML = avatar ? `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : '👤';

  // Mobile
  if (window.innerWidth <= 640) {
    document.getElementById('conv-sidebar').classList.remove('show');
    document.getElementById('chat-area').classList.add('show');
    document.getElementById('back-btn').style.display = 'block';
  }

  loadMessages(convId);
  renderConversations(conversations);

  // Start polling
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(() => loadMessages(convId, true), 5000);
}

// ── LOAD MESSAGES ──────────────────────────────────────────
async function loadMessages(convId, silent = false) {
  const data = await apiFetch('/api/messages/conversations/' + convId + '/messages');
  if (!data) return;

  const area = document.getElementById('chat-msgs');
  const wasAtBottom = area.scrollHeight - area.clientHeight <= area.scrollTop + 50;

  area.innerHTML = data.map((m, i) => {
    const isMine = m.sender_id === currentUser.id;
    const showDate = i === 0 || new Date(m.created_at).toDateString() !== new Date(data[i-1]?.created_at).toDateString();
    const time = new Date(m.created_at).toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
    
    return `
      ${showDate ? `<div class="date-divider">${new Date(m.created_at).toLocaleDateString('ru-RU', {day:'numeric',month:'long'})}</div>` : ''}
      <div class="msg-wrap ${isMine?'mine':''}">
        ${!isMine ? `<div class="msg-av">👤</div>` : ''}
        <div class="msg ${isMine?'mine':'theirs'}">
          ${m.content ? m.content : ''}
          ${m.file_url ? `<a href="${m.file_url}" target="_blank" class="msg-file ${isMine?'':'theirs'}"><span>📎</span><span>${m.file_name||'Файл'}</span></a>` : ''}
          <div class="msg-time">${time}</div>
        </div>
      </div>
    `;
  }).join('');

  if (!silent || wasAtBottom) {
    area.scrollTop = area.scrollHeight;
  }

  // Update unread
  loadConversations();
}

// ── SEND MESSAGE ───────────────────────────────────────────
async function sendMsg() {
  if (!selectedConvId) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';

  // Optimistic UI
  const area = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = 'msg-wrap mine';
  div.innerHTML = `<div class="msg mine">${text}<div class="msg-time">Сейчас</div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;

  await apiFetch('/api/messages/conversations/' + selectedConvId + '/messages', {
    method: 'POST',
    body: JSON.stringify({content: text})
  });

  loadMessages(selectedConvId, true);
}

async function sendFile(input) {
  const file = input.files[0];
  if (!file) return;
  showToast('📎 Отправка файла...');
  // In production: upload to Cloudflare R2 or S3, then send URL
  // For now: send file name as message
  await apiFetch('/api/messages/conversations/' + selectedConvId + '/messages', {
    method: 'POST',
    body: JSON.stringify({content: `📎 Файл: ${file.name}`, message_type: 'file'})
  });
  loadMessages(selectedConvId);
  showToast('✓ Файл отправлен');
}

// ── NEW CHAT ───────────────────────────────────────────────
function openNewChat() {
  document.getElementById('newChatModal').classList.add('open');
  document.getElementById('tutor-results').innerHTML = '';
  document.getElementById('tutor-search').value = '';
}

async function searchTutors(q) {
  if (!q || q.length < 2) return;
  const data = await apiFetch('/api/tutors?search=' + encodeURIComponent(q));
  if (!data?.tutors) return;

  document.getElementById('tutor-results').innerHTML = data.tutors.slice(0,5).map(t => `
    <div class="search-result" onclick="startChat('${t.id}')">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;">👤</div>
      <div>
        <div style="font-weight:600;font-size:0.85rem">${t.first_name} ${t.last_name}</div>
        <div style="font-size:0.72rem;color:var(--muted)">${(t.subjects||[]).join(', ')||'Репетитор'}</div>
      </div>
    </div>
  `).join('');
}

async function startChat(tutorUserId) {
  document.getElementById('newChatModal').classList.remove('open');
  const data = await apiFetch('/api/messages/conversations', {
    method: 'POST',
    body: JSON.stringify({other_user_id: tutorUserId})
  });
  if (data) {
    await loadConversations();
    const tutor = conversations.find(c => c.id === data.id);
    if (tutor) {
      const isStudent = currentUser.id === tutor.student_id;
      const name = isStudent ? `${tutor.tutor_first_name} ${tutor.tutor_last_name}` : `${tutor.student_first_name} ${tutor.student_last_name}`;
      openConv(data.id, name, '', 'tutor');
    }
  }
}

function bookLesson() {
  window.location.href = 'index.html#tutors-section';
}

function backToList() {
  document.getElementById('conv-sidebar').classList.add('show');
  document.getElementById('chat-area').classList.remove('show');
  if (pollInterval) clearInterval(pollInterval);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function insertEmoji(emoji) {
  const input = document.getElementById('msg-input');
  input.value += emoji;
  input.focus();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

document.getElementById('newChatModal').addEventListener('click', e => {
  if (e.target === document.getElementById('newChatModal')) {
    document.getElementById('newChatModal').classList.remove('open');
  }
});

// Init
loadConversations();
</script>
</body>
</html>
